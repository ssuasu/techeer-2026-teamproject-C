services:
  db:
    image: postgres:15
    container_name: carpool-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: carpool
    volumes:
      - ./postgres_data:/var/lib/postgresql/data # DB가 꺼져도 데이터가 보존됩니다.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d carpool"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: carpool-redis
    ports:
      - "6379:6379"

  app:
    image: ${DOCKER_USERNAME}/carpool:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carpool-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      DB_URL: jdbc:postgresql://carpool-db:5432/carpool
      DB_USERNAME: user
      DB_PASSWORD: password
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: carpool-redis
      SPRING_REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
