spring:
  profiles:
    active: local
  application:
    name: carpool

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/carpool}
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update # 엔티티 변경 시 DB 테이블 자동 업데이트
    show-sql: true     # 실행되는 SQL을 콘솔에 출력

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 900000      # 15분
  refresh-token-expiration: 604800000  # 7일
  cookie-secure: true

management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  prometheus:
    metrics:
      export:
        enabled: true

