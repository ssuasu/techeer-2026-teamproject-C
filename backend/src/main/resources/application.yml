spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
  application:
    name: carpool

  datasource:
    # 도커에 적은 정보와 똑같이 맞춥니다.
    url: jdbc:postgresql://localhost:5432/carpool
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update # 엔티티 변경 시 DB 테이블 자동 업데이트
    show-sql: true     # 실행되는 SQL을 콘솔에 출력
