name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        # 이 부분이 추가되어야 setup-gradle이 backend 폴더를 봅니다.
        build-root-directory: backend

    - name: Build with Gradle Wrapper
      # working-directory를 run 단계에서 직접 지정하는 것이 가장 확실합니다.
      run: ./gradlew build
      working-directory: ./backend

  dependency-submission:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate and submit dependency graph
      uses: gradle/actions/dependency-submission@v4
      with:
        # 이 설정이 되어 있어야 backend/gradlew를 찾습니다.
        build-root-directory: backend
