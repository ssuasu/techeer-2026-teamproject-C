apiVersion: apps/v1
kind: Deployment
metadata:
  name: carpool-app
spec:
  replicas: 2          # 앱 컨테이너를 2개 띄움 (하나 죽어도 하나 살아있음)
  selector:
    matchLabels:
      app: carpool-app
  template:
    metadata:
      labels:
        app: carpool-app
    spec:
      containers:
      - name: carpool-app
        image: carpool-app:latest        # Docker 이미지
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: REDIS_HOST
          value: carpool-redis
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://carpool-db:5432/carpool
        - name: SPRING_DATASOURCE_USERNAME
          value: user
        - name: SPRING_DATASOURCE_PASSWORD
          value: password
